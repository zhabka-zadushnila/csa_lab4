[config]
name = "sort_test"
max_ticks = 20000

[input]
source_code = """
fn main() {
    let arr: [i32; 100] = [0];
    let i: i32 = 0;
    let num: i32 = in();

    while num != 0 {
        arr[i] = num;
        i = i + 1;
        num = in();
    }

    let len: i32 = i;
    let step: i32 = 0;

    while step < len - 1 {
        let j: i32 = 0;
        while j < len - step - 1 {
            if arr[j] > arr[j + 1] {
                let temp: i32 = arr[j];
                arr[j] = arr[j + 1];
                arr[j + 1] = temp;
            }
            j = j + 1;
        }
        step = step + 1;
    }

    let k: i32 = 0;
    while k < len {
        out(arr[k]);
        k = k + 1;
    }
}
"""
stream_in = [42, 12, 85, 3, 0]

[expected]
stream_out = [3, 12, 42, 85]

