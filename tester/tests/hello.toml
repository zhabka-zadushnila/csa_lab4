[config]
name = "hello_test"
max_ticks = 20000

[input]
source_code = """
let msg: String = "Hello, world!";

fn main() {
    let i: i32 = 0;
    while msg[i] != 0 {
        out(msg[i]);
        i = i + 1;
    }
}

"""
stream_in = []

[expected]
stream_out = ["H", "e", "l", "l", "o", ",", " ", "w", "o", "r", "l", "d", "!"]

ast = """
Program
  Let msg : String
    String "Hello, world!"
  FunctionDecl main ()
    Body
      Let i : i32
        Number 0
      While
        Cond
          NotEq
            ArrayAccess msg
              Variable i
            Number 0
        Body
          ExprStmt
            FunctionCall out
              ArrayAccess msg
                Variable i
          Assign i
            Add
              Variable i
              Number 1
"""

