[config]
name = "hello_user_name_test"
max_ticks = 20000

[input]
source_code = """
let prompt: String = "What is your name?
";
let prefix: String = "Hello, ";
let suffix: String = "!
";

fn main() {
    let i: i32 = 0;
    while prompt[i] != 0 {
        out(prompt[i]);
        i = i + 1;
    }

    let name: [i32; 64] = [0];
    let j: i32 = 0;
    let c: i32 = in();

    while c != 10 && c != 0 {
        name[j] = c;
        j = j + 1;
        c = in();
    }
    name[j] = 0;

    i = 0;
    while prefix[i] != 0 {
        out(prefix[i]);
        i = i + 1;
    }

    i = 0;
    while name[i] != 0 {
        out(name[i]);
        i = i + 1;
    }

    i = 0;
    while suffix[i] != 0 {
        out(suffix[i]);
        i = i + 1;
    }
}

"""
stream_in = ["A", "l", "i", "c", "e", 10]

[expected]
stream_out = ["W", "h", "a", "t", " ", "i", "s", " ", "y", "o", "u", "r", " ", "n", "a", "m", "e", "?", 10, "H", "e", "l", "l", "o", ",", " ", "A", "l", "i", "c", "e", "!", 10]

