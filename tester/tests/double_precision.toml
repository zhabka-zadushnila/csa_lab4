[config]
name = "double_precision_test"
max_ticks = 20000

[input]
source_code = """
fn main() {
    let a_hi: i32 = 1;
    let a_lo: i32 = -1; // 0xFFFFFFFF technically
    let b_hi: i32 = 1;
    let b_lo: i32 = 1;

    let sum_lo: i32 = a_lo + b_lo;

    let carry: i32 = 0;
    if a_lo < 0 && b_lo >= 0 && sum_lo >= 0 {
        carry = 1;
    }

    let sum_hi: i32 = a_hi + b_hi + carry;

    out(sum_hi);
    out(sum_lo);
}
"""
stream_in = []

[expected]
stream_out = [3, 0]

